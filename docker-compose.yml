services:
  velocity:
    image: ${MCSRSWAP_VELOCITY_IMAGE:-ghcr.io/igelway/mcsr-swap-velocity:latest}
    container_name: mcsrswap-velocity
    ports:
      - "25565:25577"
    user: "minecraft:minecraft"
    depends_on:
      - docker-proxy
      - lobby
      - limbo
    volumes:
      - ./data/velocity:/data
      # Game-server data directories are created here by the plugin and bind-mounted into game containers.
      - ${GAME_DATA_DIR:-./data}:/managed-data
    environment:
      MCSRSWAP_DOCKER_MODE: "true"
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      MINECRAFT_SERVER_EULA: ${MINECRAFT_SERVER_EULA:-}
      MCSRSWAP_GAMESERVER_IMAGE: ${MCSRSWAP_GAMESERVER_IMAGE:-ghcr.io/igelway/mcsr-swap-gameserver:latest}
      MCSRSWAP_LOBBY_ADDRESS: ${MCSRSWAP_LOBBY_ADDRESS:-lobby}
      MCSRSWAP_LIMBO_ADDRESS: ${MCSRSWAP_LIMBO_ADDRESS:-limbo}
      # Docker network name for spawned game servers
      MCSRSWAP_DOCKER_NETWORK: ${MCSRSWAP_DOCKER_NETWORK:-mcsrswap-network}
      # Docker host URL (uses socket proxy instead of mounting /var/run/docker.sock directly)
      MCSRSWAP_DOCKER_HOST: ${MCSRSWAP_DOCKER_HOST:-tcp://docker-proxy:2375}
      # Host-side base path for game-server data; the plugin creates per-server subdirs here.
      GAME_DATA_DIR: ${GAME_DATA_DIR:-}
      # Chunky pre-generation (requires Carpet+Chunky mods in game image, default off)
      MCSRSWAP_CHUNKY_PRELOAD: ${MCSRSWAP_CHUNKY_PRELOAD:-false}
      MCSRSWAP_CHUNKY_OW_RADIUS: ${MCSRSWAP_CHUNKY_OW_RADIUS:-800}
      MCSRSWAP_CHUNKY_NETHER_RADIUS: ${MCSRSWAP_CHUNKY_NETHER_RADIUS:-800}
      MCSRSWAP_CHUNKY_END_RADIUS: ${MCSRSWAP_CHUNKY_END_RADIUS:-200}
    env_file:
      - path: .env
        required: false
    secrets:
      - forwarding_secret
    networks:
      - mcsrswap-network
    restart: unless-stopped
    stdin_open: true
    labels:
      - "mcsrswap.role=proxy"
    stop_signal: SIGTERM
    stop_grace_period: 30s

  # Lightweight Docker socket proxy to avoid binding /var/run/docker.sock into the Velocity container.
  # This still requires the proxy container to mount the host socket and is therefore only safe in
  # trusted environments. It exposes a TCP API on port 2375 reachable on the compose network.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-proxy
    restart: unless-stopped
    environment:
       - CONTAINERS=1
       - IMAGES=1
       - NETWORKS=1
       - VOLUMES=1
       - INFO=1
       - VERSION=1
       - PING=1
       - EVENTS=1
       - POST=1
       - ALLOW_START=1
       - ALLOW_STOP=1
       - ALLOW_RESTARTS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mcsrswap-network

  lobby:
    image: itzg/minecraft-server:java21
    container_name: mcsrswap-lobby
    expose:
      - "25565"
    environment:
      EULA: ${MINECRAFT_SERVER_EULA:-false}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TYPE: FABRIC
      VERSION: "1.16.1"
      ONLINE_MODE: "FALSE"
      DIFFICULTY: peaceful
      SPAWN_PROTECTION: 0
      MOTD: "MCSR-Swap Lobby"
      MEMORY: 2G
      MODS_FILE: /extras/mods.txt
      REMOVE_OLD_MODS: "true"
      FABRIC_PROXY_VELOCITY: "true"
    entrypoint: ["/bin/sh", "-c", "export FABRIC_PROXY_SECRET=\"$(cat /run/secrets/forwarding_secret)\" && exec /start"]
    secrets:
      - forwarding_secret
    volumes:
      - ./data/lobby:/data
      - ./docker/lobby-mods.txt:/extras/mods.txt:ro
    networks:
      - mcsrswap-network
    restart: unless-stopped
    user: "minecraft:minecraft"

  limbo:
    build:
      context: ./docker
      dockerfile: Dockerfile.nanolimbo
    image: ${MCSRSWAP_LIMBO_IMAGE:-mcsr-swap-limbo:latest}
    container_name: mcsrswap-limbo
    expose:
      - "25565"
    volumes:
      - ${GAME_DATA_DIR:-./data}/limbo:/data
    secrets:
      - forwarding_secret
    networks:
      - mcsrswap-network
    restart: unless-stopped

  # Optional playit.gg service – only starts when the "playit" profile is active.
  # Run with: docker compose --profile playit up -d
  # Requires a .playit.secret file with the agent key (copy from .playit.secret.example).
  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    profiles: ["playit"]
    container_name: mcsrswap-playit
    network_mode: host
    entrypoint: ["/bin/sh", "-c", "exec /playit/entrypoint.sh \"$(cat /run/secrets/playit_secret)\""]
    secrets:
      - playit_secret
    restart: unless-stopped

networks:
  mcsrswap-network:
    name: mcsrswap-network
    driver: bridge

secrets:
  forwarding_secret:
    file: ./.forwarding.secret
  playit_secret:
    file: ./.playit.secret
