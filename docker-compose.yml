version: '3.8'

services:
  velocity:
    image: ${MCSRSWAP_VELOCITY_IMAGE:-ghcr.io/OWNER/REPO-velocity:latest}
    container_name: mcsrswap-velocity
    ports:
      - "25577:25577"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./velocity-config:/server
    environment:
      TYPE: VELOCITY
      MEMORY: 1G
      MCSRSWAP_DOCKER_MODE: "true"
    networks:
      - mcsrswap-network
    restart: unless-stopped

  lobby:
    image: itzg/minecraft-server:java8
    container_name: mcsrswap-lobby
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: FABRIC
      VERSION: "1.16.1"
      ONLINE_MODE: "FALSE"
      DIFFICULTY: peaceful
      SPAWN_PROTECTION: 0
      MOTD: "MCSR-Swap Lobby"
      MEMORY: 2G
    volumes:
      - ./lobby-data:/data
    networks:
      - mcsrswap-network
    restart: unless-stopped

networks:
  mcsrswap-network:
    name: mcsrswap-network
    driver: bridge
