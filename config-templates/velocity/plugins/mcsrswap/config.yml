rotationTime: 300
requiredPercentage: 0.75
versus: false
language: en_US
gameServerPrefix: game
lobbyServerName: lobby

spectateAfterWin: true
spectateTarget: next
spectateMinTime: 10

saveHotbar: true
eyeHoverTicks: 80

# Optional: fixed world seeds for game servers (Docker mode only).
# The first seed is used for game1, the second for game2, etc.
# If fewer seeds than servers are configured, the rest are chosen randomly.
# worldSeeds:
#   - 123456789
#   - -987654321

# Docker mode (auto-enabled in Docker container via MCSRSWAP_DOCKER_MODE env var)
docker:
  enabled: false
  network: mcsrswap-network

# Admin users (UUID or username) - these users get swap.admin permission automatically
# You can also use LuckPerms to manage permissions manually
# admins:
  # - "069a79f4-44e9-4726-a5be-fca90e38aaf9"
