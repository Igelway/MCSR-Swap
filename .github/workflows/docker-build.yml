name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  VELOCITY_IMAGE_NAME: ${{ github.repository }}-velocity
  GAMESERVER_IMAGE_NAME: ${{ github.repository }}-gameserver

jobs:
  build-fabric-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: ./fabric-mod
        run: chmod +x gradlew
      
      - name: Validate Gradle wrapper
        working-directory: ./fabric-mod
        uses: gradle/wrapper-validation-action@v2
      
      - name: Build Fabric Mod
        working-directory: ./fabric-mod
        run: ./gradlew build --no-daemon
      
      - name: Upload Fabric Mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabric-mod
          path: fabric-mod/build/libs/mcsrswap-fabric-mod-*.jar
          retention-days: 1

  build-velocity-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      
      - name: Build Velocity Plugin
        working-directory: ./velocity-plugin
        run: mvn clean package -DskipTests
      
      - name: Upload Velocity Plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-plugin
          path: velocity-plugin/target/mcsrswap-velocity-plugin-*.jar
          retention-days: 1

  build-gameserver-image:
    runs-on: ubuntu-latest
    needs: build-fabric-mod
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Fabric Mod artifact
        uses: actions/download-artifact@v4
        with:
          name: fabric-mod
          path: fabric-mod/build/libs/
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GAMESERVER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Game Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.gameserver
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-velocity-image:
    runs-on: ubuntu-latest
    needs: build-velocity-plugin
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Velocity Plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: velocity-plugin
          path: velocity-plugin/target/
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.VELOCITY_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Velocity image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.velocity
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
