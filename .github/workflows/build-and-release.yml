name: Build, Release and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  VELOCITY_IMAGE_NAME: ${{ github.repository }}-velocity
  GAMESERVER_IMAGE_NAME: ${{ github.repository }}-gameserver

jobs:
  build-fabric-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: ./fabric-mod
        run: chmod +x gradlew
      
      - name: Build Fabric Mod
        working-directory: ./fabric-mod
        run: ./gradlew build --no-daemon
      
      - name: Upload Fabric Mod artifact
        uses: actions/upload-artifact@v6
        with:
          name: fabric-mod-${{ github.ref_name }}
          path: fabric-mod/build/libs/mcsrswap-fabric-mod-*.jar
          retention-days: 1

  build-velocity-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Build Velocity Plugin
        working-directory: ./velocity-plugin
        run: mvn clean package -DskipTests
      
      - name: Upload Velocity Plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: velocity-plugin-${{ github.ref_name }}
          path: velocity-plugin/target/mcsrswap-velocity-plugin-*.jar
          retention-days: 1

  build-gameserver-image:
    runs-on: ubuntu-latest
    needs: build-fabric-mod
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Create build directory
        run: mkdir -p fabric-mod/build/libs
      
      - name: Download Fabric Mod artifact
        uses: actions/download-artifact@v6
        with:
          name: fabric-mod-${{ github.ref_name }}
          path: fabric-mod/build/libs/
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.GAMESERVER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}
      
      - name: Build and push Game Server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.gameserver
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-velocity-image:
    runs-on: ubuntu-latest
    needs: build-velocity-plugin
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Create target directory
        run: mkdir -p velocity-plugin/target
      
      - name: Download Velocity Plugin artifact
        uses: actions/download-artifact@v6
        with:
          name: velocity-plugin-${{ github.ref_name }}
          path: velocity-plugin/target/
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.VELOCITY_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}
      
      - name: Build and push Velocity image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.velocity
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    runs-on: ubuntu-latest
    needs: [build-fabric-mod, build-velocity-plugin]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Fabric Mod artifact
        uses: actions/download-artifact@v4
        with:
          name: fabric-mod-${{ github.ref_name }}
          path: ./artifacts/
      
      - name: Download Velocity Plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: velocity-plugin-${{ github.ref_name }}
          path: ./artifacts/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
