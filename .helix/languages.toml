[[language]]
name = "java"
indent = { tab-width = 4, unit = "    " }
formatter = { command = "google-java-format", args = ["--aosp", "-"] }
auto-format = true

[[language]]
name = "bash"
indent = { tab-width = 2, unit = "  " }
auto-format = false

[[language]]
name = "just"
indent = { tab-width = 4, unit = "\t" }
