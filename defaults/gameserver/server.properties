# Minimal server.properties
# Copy to each game server's working directory before first start.
#
# Only values that differ from Minecraft's vanilla defaults are listed here.

# REQUIRED: Must be false when running behind a Velocity proxy.
# Velocity handles authentication; backends with online-mode=true will reject players (UUID mismatch).
online-mode=false

difficulty=easy
spawn-protection=0

# Reduces unnecessary overhead on a dedicated server
enable-command-block=false
